<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | IMC Rollout System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="container">
    <div class="card">

        <div class="logo">
            <h1>IMC <span>Login</span></h1>
            <p class="subtitle">
                Sign in to access the IMC Rollout &amp; Project Tracking System
            </p>
        </div>

        <form id="loginForm" novalidate>

            <div class="form-group" id="emailGroup">
                <label for="email">DLSU Email</label>
                <input
                    type="email"
                    id="email"
                    placeholder="juan_dela_cruz@dlsu.edu.ph"
                    autocomplete="email"
                >
                <div class="field-error" id="emailError"></div>
            </div>

            <div class="form-group" id="passwordGroup">
                <label for="password">Password</label>
                <div class="password-wrap">
                    <input
                        type="password"
                        id="password"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                    >
                    <button
                        type="button"
                        class="toggle-pw"
                        id="togglePw"
                        aria-label="Show password"
                    >
                        <!-- eye icon — toggled by JS -->
                        <svg id="iconShow" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg id="iconHide" viewBox="0 0 24 24" aria-hidden="true" style="display:none">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
                <div class="field-error" id="passwordError"></div>
            </div>

            <button type="submit" class="btn" id="submitBtn">
                Sign In
            </button>

            <div id="message" class="message" role="alert" aria-live="polite"></div>

        </form>

        <p class="register-link">
            Don&rsquo;t have an account?
            <a href="register.html">Create one here</a>
        </p>

    </div>
</div>

<script src="js/common.js"></script>
<script src="js/login.js"></script>

</body>
</html>
